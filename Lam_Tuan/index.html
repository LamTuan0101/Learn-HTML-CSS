<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<!-- 
    border: use to format border of element
    general syntax:
        tag {
            border-vị trí: [màu sắc] [kiểu] [độ rộng];
        }
    attributes of format border:
        ▪ border-color
        ▪ border-style
        ▪ border-width
        ▪ border-radius
    
        
-->

<!-- 
    PSEUDO - CLASS
    1. Nhóm Pseudo-class tương tác:
        ▪ :hover: Khi người dùng di chuột qua phần tử (thường dùng cho nút bấm hoặc link).
        ▪ :active: Khi phần tử đang được nhấn giữ chuột.
        ▪ :focus: Khi phần tử đang được chọn (chẳng hạn như đang gõ chữ vào ô Input).

    2. Nhóm Pseudo-class cấu trúc:
        ▪ :first-child: Chọn phần tử con đầu tiên.
        ▪ :last-child: Chọn phần tử con cuối cùng.
        ▪ :nth-child(n): Chọn phần tử thứ n.

    3. Nhóm Pseudo-class trạng thái form:
        ▪ :checked: Khi một checkbox hoặc radio button được chọn.
        ▪ :disabled: Khi một ô nhập liệu bị khóa không cho dùng.
        ▪ :invalid: Khi dữ liệu người dùng nhập vào bị sai định dạng (chẳng hạn gõ email thiếu chữ @).
    
-->

<body>
    <h1>Learn Casarding Style Sheets</h1>
    <p class="p">Huy Tuan is not intelligent</p>

    <!-- Psoudo ex3 -->
    <input type="checkbox" id="task1">
    <label for="task1">Hoàn thành bài tập CSS</label>
</body>

</html>
